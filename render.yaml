services:
  - type: web
    name: tickertap-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm run start:server
    autoDeploy: true
    envVars:
      - key: ZERODHA_SERVER_PORT
        value: 10000
      - key: FMP_API_KEY
        sync: false
      - key: FMP_API_BASE_URL
        value: https://financialmodelingprep.com/stable
